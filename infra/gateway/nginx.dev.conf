server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  location = / {
    return 302 /admin/;
  }

  # Backend API/Auth/Docs
  location /api/ {
    proxy_pass http://backend-dev:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Vector HTTP ingest (tenant source instances)
  # Required headers from sender:
  # - X-Tenant-Slug: tenant slug
  # - X-Vector-Source-Id: tenant source id
  # - X-Vector-Auth-Token: token mode when needed
  # - Authorization: basic mode when needed
  location = /_vector_http_auth {
    internal;
    proxy_pass http://backend-dev:3000/internal/vector-http-auth/validate;
    proxy_http_version 1.1;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Tenant-Slug $http_x_tenant_slug;
    proxy_set_header X-Vector-Source-Id $http_x_vector_source_id;
    proxy_set_header X-Vector-Auth-Token $http_x_vector_auth_token;
    proxy_set_header Authorization $http_authorization;
  }

  location /vector-ingest/ {
    auth_request /_vector_http_auth;
    proxy_pass http://vector-dev:8686;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /auth/ {
    proxy_pass http://backend-dev:3000/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs/ {
    proxy_pass http://backend-dev:3000/docs/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # HMR/WebSocket support for Vite dev servers
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  # Master Admin UI
  location = /admin {
    return 301 /admin/;
  }

  location /admin/ {
    proxy_pass http://frontend-admin-dev:5174/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Tenant UI
  location = /tenant {
    return 301 /tenant/;
  }

  location /tenant/ {
    proxy_pass http://frontend-tenant-dev:5173/tenant/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
