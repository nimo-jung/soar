name: tms

# ─────────────────────────────────────────────────────────────────────────────
# 실행 방법
#   개발 모드:       docker compose --profile dev --env-file .env.dev up -d --build
#   운영 모드:       docker compose --profile prod --env-file .env.prod up -d --build
#   운영 진입점:      http://localhost:${PORT_ADMIN_GATEWAY:-8088}/admin (Master), /tenant (Tenant), /docs
#   인프라만:        docker compose up -d
#   인프라 종료:     docker compose down
#   데이터까지 삭제: docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────────────────────
  # Infrastructure  (프로파일 없음 → 항상 기동)
  # ───────────────────────────────────────────────────────────────────────────

  mariadb:
    image: mariadb:11.4
    container_name: tms-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: tms_admin          # 관리용 DB (테넌트 메타데이터 저장)
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "${PORT_MARIADB:-3306}:3306"
    volumes:
      - /home1/tms/mariadb:/var/lib/mysql
      - ./infra/mariadb/init:/docker-entrypoint-initdb.d:ro  # 초기화 스크립트
    networks:
      - tms-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: tms-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${PORT_REDIS:-6379}:6379"
    volumes:
      - /home1/tms/redis:/data
    networks:
      - tms-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: tms-clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1  # 런타임 사용자/DB 관리 허용
    ports:
      - "${PORT_CLICKHOUSE_HTTP:-8123}:8123"   # HTTP Interface  (NestJS, 브라우저 쿼리)
      - "${PORT_CLICKHOUSE_NATIVE:-9000}:9000" # Native TCP      (Go 엔진 고성능 적재)
    volumes:
      - /home1/tms/clickhouse:/var/lib/clickhouse
      - ./infra/clickhouse/config:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - tms-network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host localhost --port 9000 --query 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    container_name: tms-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "${PORT_REDPANDA_KAFKA:-19092}:19092"   # Kafka (컨테이너 외부 접근)
      - "${PORT_REDPANDA_PROXY:-18082}:18082"   # Pandaproxy REST
      - "${PORT_REDPANDA_SCHEMA:-18081}:18081"  # Schema Registry
      - "${PORT_REDPANDA_ADMIN:-9644}:9644"     # Admin API
    volumes:
      - /home1/tms/redpanda:/var/lib/redpanda/data
    networks:
      - tms-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qE 'Healthy:\\s+true'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redpanda-console:
    profiles: [dev]
    image: redpandadata/console:v2.7.2
    container_name: tms-redpanda-console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml && /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "${PORT_REDPANDA_CONSOLE:-8080}:8080"
    networks:
      - tms-network
    depends_on:
      redpanda:
        condition: service_healthy

  mailpit:
    profiles: [dev, prod]
    image: axllent/mailpit:v1.26
    container_name: tms-mailpit-dev
    ports:
      - "${PORT_MAILPIT_SMTP:-1025}:1025"
      - "${PORT_MAILPIT_UI:-8025}:8025"
    networks:
      - tms-network

  # ───────────────────────────────────────────────────────────────────────────
  # Application
  #   Dev:  docker compose --profile dev --env-file .env.dev up -d --build
  #   Prod: docker compose --profile prod --env-file .env.prod up -d --build
  # ───────────────────────────────────────────────────────────────────────────

  backend-dev:
    profiles: [dev]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tms-backend-dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      # MariaDB (tms_admin)
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      DB_NAME: tms_admin
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # ClickHouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_NATIVE_PORT: "9000"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # RedPanda (컨테이너 내부 주소)
      KAFKA_BROKERS: redpanda:9092
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      # SMTP (Local 모드 : Mailpit / 외부 SMTP 모드 : DB 설정값 사용)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM}
      TENANT_BOOTSTRAP_URL: ${TENANT_BOOTSTRAP_URL:-}
    ports:
      - "${PORT_BACKEND:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules          # 호스트 node_modules와 충돌 방지
      - ./product.dat:/app/product.dat:ro  # 제품 정보 파일 (읽기 전용)
    networks:
      - tms-network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      mailpit:
        condition: service_started

  backend-prod:
    profiles: [prod]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: tms-backend-prod
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      # MariaDB (tms_admin)
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      DB_NAME: tms_admin
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # ClickHouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_NATIVE_PORT: "9000"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # RedPanda (컨테이너 내부 주소)
      KAFKA_BROKERS: redpanda:9092
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      # SMTP (Local 모드 : Mailpit / 외부 SMTP 모드 : DB 설정값 사용)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM}
      TENANT_BOOTSTRAP_URL: ${TENANT_BOOTSTRAP_URL:-}
    ports:
      - "${PORT_BACKEND:-3000}:3000"
    volumes:
      - /home1/tms/product.dat:/app/product.dat:ro  # 제품 정보 파일 (읽기 전용)
    networks:
      - tms-network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      mailpit:
        condition: service_started

  go-engine-dev:
    profiles: [dev]
    build:
      context: ./go-engine
      dockerfile: Dockerfile
    container_name: tms-go-engine-dev
    env_file:
      - .env.dev
    environment:
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # RedPanda (컨테이너 내부 주소)
      REDPANDA_HOST: redpanda
      REDPANDA_PORT: "9092"
      # ClickHouse (Native TCP — 고성능 배치 적재용)
      CLICKHOUSE_DSN: clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/default
      # General
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "8081"
    ports:
      - "${PORT_GO_ENGINE:-8081}:8081"  # 로그 수집 HTTP 엔드포인트
    networks:
      - tms-network
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  go-engine-prod:
    profiles: [prod]
    build:
      context: ./go-engine
      dockerfile: Dockerfile
    container_name: tms-go-engine-prod
    env_file:
      - .env.prod
    environment:
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # RedPanda (컨테이너 내부 주소)
      REDPANDA_HOST: redpanda
      REDPANDA_PORT: "9092"
      # ClickHouse (Native TCP — 고성능 배치 적재용)
      CLICKHOUSE_DSN: clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/default
      # General
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "8081"
    ports:
      - "${PORT_GO_ENGINE:-8081}:8081"
    networks:
      - tms-network
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  # Master Admin UI  —  공급자용 (테넌트 생성·쿼터·TI 배포·빌링)
  frontend-admin-dev:
    profiles: [dev]
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      target: development
    container_name: tms-frontend-admin-dev
    env_file:
      - .env.dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
      VITE_PROXY_TARGET: http://backend-dev:4000
    ports:
      - "${PORT_FRONTEND_ADMIN:-5174}:5174"
    volumes:
      - ./frontend-admin:/app
      - /app/node_modules
    networks:
      - tms-network
    depends_on:
      - backend-dev

  frontend-admin-prod:
    profiles: [prod]
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      target: production
    container_name: tms-frontend-admin-prod
    env_file:
      - .env.prod
    environment:
      VITE_API_BASE_URL: /api
      VITE_BASE_PATH: /admin/
    networks:
      - tms-network
    depends_on:
      - backend-prod

  # Tenant UI  —  고객사용 (SIEM 대시보드·플레이북·알림·화이트라벨링)
  frontend-tenant-dev:
    profiles: [dev]
    build:
      context: ./frontend-tenant
      dockerfile: Dockerfile
      target: development
    container_name: tms-frontend-tenant-dev
    env_file:
      - .env.dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
      VITE_PROXY_TARGET: http://backend-dev:4000
    ports:
      - "${PORT_FRONTEND_TENANT:-5173}:5173"
    volumes:
      - ./frontend-tenant:/app
      - /app/node_modules
    networks:
      - tms-network
    depends_on:
      - backend-dev

  frontend-tenant-prod:
    profiles: [prod]
    build:
      context: ./frontend-tenant
      dockerfile: Dockerfile
      target: production
    container_name: tms-frontend-tenant-prod
    env_file:
      - .env.prod
    environment:
      VITE_API_BASE_URL: /api
      VITE_BASE_PATH: /tenant/
    networks:
      - tms-network
    depends_on:
      - backend-prod

  gateway-prod:
    profiles: [prod]
    image: nginx:1.27-alpine
    container_name: tms-gateway-prod
    ports:
      - "${PORT_ADMIN_GATEWAY:-8088}:80"
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tms-network
    depends_on:
      - backend-prod
      - frontend-admin-prod
      - frontend-tenant-prod

# ─────────────────────────────────────────────────────────────────────────────
networks:
  tms-network:
    driver: bridge
