name: tms
# Host prerequisites
# - Docker Engine (https://docs.docker.com/get-docker/)
# - Docker Compose plugin (docker compose) or docker-compose binary
# - Recommended: sufficient disk for ClickHouse/Qdrant volumes, NVMe for Qdrant storage
# The scripts in `scripts/` will run preflight checks using scripts/check-deps.sh

# ─────────────────────────────────────────────────────────────────────────────
# 실행 방법
#   개발 모드:       docker compose --profile dev --env-file .env.dev up -d --build
#   운영 모드:       docker compose --profile prod --env-file .env.prod up -d --build
#   운영 진입점:      http://localhost:${PORT_FRONTEND:-5173}/master (UI), http://localhost:${PORT_BACKEND:-3000}/docs
#   인프라만:        docker compose up -d
#   인프라 종료:     docker compose down
#   데이터까지 삭제: docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────────────────────
  # Infrastructure  (프로파일 없음 → 항상 기동)
  # ───────────────────────────────────────────────────────────────────────────

  mariadb:
    image: mariadb:11.4
    container_name: tms-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: tms_admin          # 관리용 DB (테넌트 메타데이터 저장)
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "${PORT_MARIADB:-3306}:3306"
    volumes:
      - /home1/tms/mariadb:/var/lib/mysql
      - ./infra/mariadb/init:/docker-entrypoint-initdb.d:ro  # 초기화 스크립트
    networks:
      - tms-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: tms-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${PORT_REDIS:-6379}:6379"
    volumes:
      - /home1/tms/redis:/data
    networks:
      - tms-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: tms-clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1  # 런타임 사용자/DB 관리 허용
    ports:
      - "${PORT_CLICKHOUSE_HTTP:-8123}:8123"   # HTTP Interface  (NestJS, 브라우저 쿼리)
      - "${PORT_CLICKHOUSE_NATIVE:-9000}:9000" # Native TCP      (Go 엔진 고성능 적재)
    volumes:
      - /home1/tms/clickhouse:/var/lib/clickhouse
      - ./infra/clickhouse/config:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - tms-network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host localhost --port 9000 --query 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    container_name: tms-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "${PORT_REDPANDA_KAFKA:-19092}:19092"   # Kafka (컨테이너 외부 접근)
      - "${PORT_REDPANDA_PROXY:-18082}:18082"   # Pandaproxy REST
      - "${PORT_REDPANDA_SCHEMA:-18081}:18081"  # Schema Registry
      - "${PORT_REDPANDA_ADMIN:-9644}:9644"     # Admin API
    volumes:
      - /home1/tms/redpanda:/var/lib/redpanda/data
    networks:
      - tms-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qE 'Healthy:\\s+true'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redpanda-console:
    profiles: [dev]
    image: redpandadata/console:v2.7.2
    container_name: tms-redpanda-console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml && /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "${PORT_REDPANDA_CONSOLE:-8080}:8080"
    networks:
      - tms-network
    depends_on:
      redpanda:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tms-qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    ports:
      - "${PORT_QDRANT_HTTP:-6333}:6333"
      - "${PORT_QDRANT_GRPC:-6334}:6334"
    volumes:
      - /home1/tms/qdrant:/qdrant/storage
    networks:
      - tms-network
    healthcheck:
      test: ["CMD-SHELL","curl -sS http://localhost:6333/api/v1/collections || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    profiles: [dev, prod]
    image: axllent/mailpit:v1.26
    container_name: tms-mailpit-dev
    ports:
      - "${PORT_MAILPIT_SMTP:-1025}:1025"
      - "${PORT_MAILPIT_UI:-8025}:8025"
    networks:
      - tms-network

  vector-dev:
    profiles: [dev]
    image: timberio/vector:0.42.0-alpine
    container_name: tms-vector-dev
    command: ["--config", "/etc/vector/vector.yaml"]
    environment:
      VECTOR_SELF_NODE_NAME: vector-dev
      VECTOR_KAFKA_BROKERS: redpanda:9092
      VECTOR_OUTPUT_TOPIC: logs.parsed.input
      VECTOR_QUARANTINE_TOPIC: logs.quarantine
    ports:
      - "${PORT_VECTOR_SYSLOG_TCP:-1514}:1514/tcp"
      - "${PORT_VECTOR_SYSLOG_UDP:-1514}:1514/udp"
    volumes:
      - ./infra/vector/vector.yaml:/etc/vector/vector.yaml:ro
    networks:
      - tms-network
    depends_on:
      redpanda:
        condition: service_healthy
      qdrant:
        condition: service_started

  vector-prod:
    profiles: [prod]
    image: timberio/vector:0.42.0-alpine
    container_name: tms-vector-prod
    command: ["--config", "/etc/vector/vector.yaml"]
    environment:
      VECTOR_SELF_NODE_NAME: vector-prod
      VECTOR_KAFKA_BROKERS: redpanda:9092
      VECTOR_OUTPUT_TOPIC: logs.parsed.input
      VECTOR_QUARANTINE_TOPIC: logs.quarantine
    ports:
      - "${PORT_VECTOR_SYSLOG_TCP:-1514}:1514/tcp"
      - "${PORT_VECTOR_SYSLOG_UDP:-1514}:1514/udp"
    volumes:
      - ./infra/vector/vector.yaml:/etc/vector/vector.yaml:ro
    networks:
      - tms-network
    depends_on:
      redpanda:
        condition: service_healthy
      qdrant:
        condition: service_started

  # ───────────────────────────────────────────────────────────────────────────
  # Application
  #   Dev:  docker compose --profile dev --env-file .env.dev up -d --build
  #   Prod: docker compose --profile prod --env-file .env.prod up -d --build
  # ───────────────────────────────────────────────────────────────────────────

  backend-dev:
    profiles: [dev]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tms-backend-dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      PORT_BACKEND: "3000"
      # MariaDB (tms_admin)
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      DB_NAME: tms_admin
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # ClickHouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_NATIVE_PORT: "9000"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # RedPanda (컨테이너 내부 주소)
      KAFKA_BROKERS: redpanda:9092
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      # SMTP (Local 모드 : Mailpit / 외부 SMTP 모드 : DB 설정값 사용)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM}
      TENANT_BOOTSTRAP_URL: ${TENANT_BOOTSTRAP_URL:-}
    ports:
      - "${PORT_BACKEND:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules          # 호스트 node_modules와 충돌 방지
      - ./product.dat:/app/product.dat:ro  # 제품 정보 파일 (읽기 전용)
    networks:
      - tms-network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      mailpit:
        condition: service_started

  backend-prod:
    profiles: [prod]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: tms-backend-prod
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT_BACKEND: "3000"
      # MariaDB (tms_admin)
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      DB_NAME: tms_admin
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # ClickHouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_NATIVE_PORT: "9000"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # RedPanda (컨테이너 내부 주소)
      KAFKA_BROKERS: redpanda:9092
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      # SMTP (Local 모드 : Mailpit / 외부 SMTP 모드 : DB 설정값 사용)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM}
      TENANT_BOOTSTRAP_URL: ${TENANT_BOOTSTRAP_URL:-}
    ports:
      - "${PORT_BACKEND:-3000}:3000"
    volumes:
      - /home1/tms/product.dat:/app/product.dat:ro  # 제품 정보 파일 (읽기 전용)
    networks:
      - tms-network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      mailpit:
        condition: service_started

  go-engine-dev:
    profiles: [dev]
    build:
      context: ./go-engine
      dockerfile: Dockerfile
    container_name: tms-go-engine-dev
    env_file:
      - .env.dev
    environment:
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # RedPanda (컨테이너 내부 주소)
      REDPANDA_HOST: redpanda
      REDPANDA_PORT: "9092"
      # ClickHouse (Native TCP — 고성능 배치 적재용)
      CLICKHOUSE_DSN: clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/default
      # General
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENGINE_PIPELINE_MODE: vector
      ROUTER_INPUT_TOPIC: logs.parsed.input
      ROUTER_QUARANTINE_TOPIC: logs.quarantine
      ROUTER_CONSUMER_GROUP: tms-router-dev
      PORT: "8081"
    ports:
      - "${PORT_GO_ENGINE:-8081}:8081"  # 로그 수집 HTTP 엔드포인트
    networks:
      - tms-network
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      vector-dev:
        condition: service_started
      qdrant:
        condition: service_healthy

  go-engine-prod:
    profiles: [prod]
    build:
      context: ./go-engine
      dockerfile: Dockerfile
    container_name: tms-go-engine-prod
    env_file:
      - .env.prod
    environment:
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # RedPanda (컨테이너 내부 주소)
      REDPANDA_HOST: redpanda
      REDPANDA_PORT: "9092"
      # ClickHouse (Native TCP — 고성능 배치 적재용)
      CLICKHOUSE_DSN: clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/default
      # General
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENGINE_PIPELINE_MODE: vector
      ROUTER_INPUT_TOPIC: logs.parsed.input
      ROUTER_QUARANTINE_TOPIC: logs.quarantine
      ROUTER_CONSUMER_GROUP: tms-router-prod
      PORT: "8081"
    ports:
      - "${PORT_GO_ENGINE:-8081}:8081"
    networks:
      - tms-network
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      vector-prod:
        condition: service_started
      qdrant:
        condition: service_healthy

  python-ai:
    profiles: [dev, prod]
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    container_name: tms-python-ai
    env_file:
      - .env.dev
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDPANDA_HOST: redpanda
      REDPANDA_PORT: "9092"
    ports:
      - "8000:8000"
    networks:
      - tms-network
    depends_on:
      qdrant:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  # Unified Master UI  —  Tenant 디자인 기반 통합 콘솔
  frontend-dev:
    profiles: [dev]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: tms-frontend-dev
    env_file:
      - .env.dev
    environment:
      VITE_API_BASE_URL: /api
      VITE_BASE_PATH: /
      VITE_PROXY_TARGET: http://backend-dev:3000
    ports:
      - "${PORT_FRONTEND:-5173}:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - tms-network
    depends_on:
      - backend-dev

  frontend-prod:
    profiles: [prod]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: tms-frontend-prod
    env_file:
      - .env.prod
    environment:
      VITE_API_BASE_URL: /api
      VITE_BASE_PATH: /
    ports:
      - "${PORT_FRONTEND:-5173}:80"
    networks:
      - tms-network
    depends_on:
      - backend-prod

# ─────────────────────────────────────────────────────────────────────────────
networks:
  tms-network:
    driver: bridge
